<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign up</title>
</head>
<body>
  <form id="signup">
    <input id="username" type="text" value="">

    <button id="submit" type="button"
      onclick="document.getElementById('welcome').textContent = 'Welcome, ' + document.getElementById('username').value;">
      Sign up
    </button>

    <p id="welcome"></p>
  </form>
</body>
</html>
